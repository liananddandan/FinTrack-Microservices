name: Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml

  changes:
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      web_portal: ${{ steps.filter.outputs.web_portal }}
      web_admin: ${{ steps.filter.outputs.web_admin }}
      gateway: ${{ steps.filter.outputs.gateway }}
      notification_service: ${{ steps.filter.outputs.notification_service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web_portal:
              - 'apps/web-portal-react/**'
            web_admin:
              - 'apps/web-admin-react/**'
            gateway:
              - 'src/Services/GatewayService/**'
            notification_service:
              - 'src/Services/NotificationService/**'

  build-web-portal:
    needs: changes
    if: needs.changes.outputs.web_portal == 'true'
    uses: ./.github/workflows/web-portal-react-image.yml
      
  build-web-admin:
    needs: changes
    if: needs.changes.outputs.web_admin == 'true'
    uses: ./.github/workflows/web-admin-react-image.yml
          
  build-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/gateway-image.yml
    
  build-notification-service:
    needs: changes
    if: needs.changes.outputs.notification_service == 'true'
    uses: ./.github/workflows/notification-service-image.yml
      
  deploy:
    needs:
      - changes
      - build-web-portal
      - build-web-admin
      - build-gateway
      - build-notification-service
    if: |
      always() &&
      needs.ci.result != 'failure'

    uses: ./.github/workflows/cd.yml
    with:
      deploy_web_portal: ${{ needs.changes.outputs.web_portal == 'true' }}
      deploy_web_admin: ${{ needs.changes.outputs.web_admin == 'true' }}
      deploy_gateway: ${{ needs.changes.outputs.gateway == 'true' }}
      deploy_notification_service: ${{ needs.changes.outputs.notification_service == 'true' }}
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}