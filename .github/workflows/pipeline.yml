name: Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml

  changes:
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      web_portal: ${{ steps.filter.outputs.web_portal }}
      web_admin: ${{ steps.filter.outputs.web_admin }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web_portal:
              - 'apps/web-portal-react/**'
            web_admin:
              - 'apps/web-admin-react/**'
            gateway:
              - 'src/Services/GatewayService/**'

  build-web-portal:
    needs: changes
    if: needs.changes.outputs.web_portal == 'true'
    uses: ./.github/workflows/web-portal-react-image.yml
      
  build-web-admin:
    needs: changes
    if: needs.changes.outputs.web_admin == 'true'
    uses: ./.github/workflows/web-admin-react-image.yml
          
  build-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/gateway-image.yml
      
  deploy:
    needs:
      - changes
      - build-web-portal
      - build-web-admin
    if: |
      always() &&
      needs.ci.result != 'failure' &&
      (needs.changes.outputs.web_portal == 'true' || needs.changes.outputs.web_admin == 'true') &&
      (needs.build-web-portal.result == 'success' || needs.build-web-portal.result == 'skipped') &&
      (needs.build-web-admin.result == 'success' || needs.build-web-admin.result == 'skipped')
    uses: ./.github/workflows/cd.yml
    with:
      deploy_web_portal: ${{ needs.changes.outputs.web_portal == 'true' }}
      deploy_web_admin: ${{ needs.changes.outputs.web_admin == 'true' }}
      deploy_gateway: ${{ needs.changes.outputs.gateway == 'true' }}